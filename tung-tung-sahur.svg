<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>

  <!-- Crescent moon -->
  <circle cx="320" cy="60" r="30" fill="#f0c040"/>
  <circle cx="335" cy="50" r="26" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="50" cy="40" r="3" fill="#fff" opacity="0.8"/>
  <circle cx="100" cy="80" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="270" cy="30" r="2.5" fill="#fff" opacity="0.7"/>
  <circle cx="80" cy="120" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="360" cy="110" r="2" fill="#fff" opacity="0.6"/>

  <!-- Bedug (traditional drum) -->
  <ellipse cx="200" cy="220" rx="70" ry="50" fill="#8B4513"/>
  <ellipse cx="200" cy="220" rx="55" ry="38" fill="#D2B48C"/>
  <ellipse cx="200" cy="220" rx="50" ry="34" fill="#F5DEB3"/>
  <!-- Drum head top -->
  <ellipse cx="200" cy="175" rx="60" ry="12" fill="#A0522D"/>
  <ellipse cx="200" cy="175" rx="55" ry="10" fill="#DEB887"/>

  <!-- Drum stand -->
  <rect x="185" y="260" width="8" height="30" fill="#654321" rx="2"/>
  <rect x="207" y="260" width="8" height="30" fill="#654321" rx="2"/>
  <rect x="170" y="285" width="60" height="8" fill="#654321" rx="3"/>

  <!-- Drumstick left -->
  <line x1="140" y1="160" x2="175" y2="185" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
  <circle cx="140" cy="158" r="5" fill="#A0522D"/>

  <!-- Drumstick right -->
  <line x1="260" y1="160" x2="225" y2="185" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
  <circle cx="260" cy="158" r="5" fill="#A0522D"/>

  <!-- Impact lines -->
  <line x1="170" y1="178" x2="158" y2="170" stroke="#FFD700" stroke-width="2" opacity="0.7"/>
  <line x1="175" y1="170" x2="165" y2="158" stroke="#FFD700" stroke-width="2" opacity="0.7"/>
  <line x1="230" y1="178" x2="242" y2="170" stroke="#FFD700" stroke-width="2" opacity="0.7"/>
  <line x1="225" y1="170" x2="235" y2="158" stroke="#FFD700" stroke-width="2" opacity="0.7"/>

  <!-- TUNG TUNG TUNG SAHUR text -->
  <text x="200" y="340" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="36" font-weight="bold" fill="#FF6B35" stroke="#fff" stroke-width="1.5">
    TUNG TUNG TUNG
  </text>
  <text x="200" y="375" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="32" font-weight="bold" fill="#FFD700" stroke="#fff" stroke-width="1.5">
    🌙 SAHUR! 🌙
  </text>

  <!-- Sound wave effects -->
  <text x="130" y="130" font-size="16" fill="#FF6B35" opacity="0.8">🔔 TUNG!</text>
  <text x="230" y="110" font-size="16" fill="#FF6B35" opacity="0.6">🔔 TUNG!</text>
  <text x="160" y="100" font-size="14" fill="#FFD700" opacity="0.5">🔔 TUNG!</text>
</svg>
