<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SENTRY — Agent Command Console</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080b1a;--surface:#0e1128;--card:#151838;--border:rgba(99,102,241,0.12);--primary:#6366f1;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--text:#e2e8f0;--muted:rgba(255,255,255,0.35)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:800;font-size:16px;display:flex;align-items:center;gap:10px}
.logo .badge{background:var(--primary);color:#fff;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600}
.stats{display:flex;gap:16px;font-size:12px}
.stats span{color:var(--muted)}.stats strong{color:var(--text)}
.container{max-width:1100px;margin:0 auto;padding:24px}
.grid{display:grid;grid-template-columns:1fr;gap:16px}
.agent-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;transition:0.3s}
.agent-card:hover{border-color:var(--primary)}
.agent-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.agent-name{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
.agent-name .tag{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600}
.tag.subagent{background:rgba(99,102,241,0.15);color:var(--primary)}
.tag.sentry{background:rgba(34,197,94,0.15);color:var(--green)}
.tag.idle{background:rgba(255,255,255,0.06);color:var(--muted)}
.tag.active{background:rgba(34,197,94,0.15);color:var(--green)}
.agent-meta{font-size:11px;color:var(--muted);line-height:1.8}
.agent-meta strong{color:var(--text)}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.status-dot.green{background:var(--green);box-shadow:0 0 8px rgba(34,197,94,0.4)}
.status-dot.amber{background:var(--amber);box-shadow:0 0 8px rgba(245,158,11,0.4)}
.status-dot.red{background:var(--red);box-shadow:0 0 8px rgba(239,68,68,0.4)}
.status-dot.gray{background:var(--muted)}
h2{font-size:16px;font-weight:700;margin:24px 0 12px;display:flex;align-items:center;gap:8px}
h2 .count{font-size:12px;color:var(--muted);font-weight:400}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.empty .icon{font-size:32px;margin-bottom:8px}
.refresh-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;font-family:'Inter',sans-serif;font-size:11px;cursor:pointer;transition:0.3s}
.refresh-btn:hover{border-color:var(--primary);color:var(--text)}
.last-update{font-size:11px;color:var(--muted);text-align:center;margin-top:12px}
footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;border-top:1px solid var(--border);margin-top:40px}
@media(max-width:600px){.agent-header{flex-direction:column;gap:8px}}
</style>
</head>
<body>
<nav>
<div class="logo">SENTRY <span class="badge">v1</span></div>
<div class="stats">
<span>Agents: <strong id="totalCount">?</strong></span>
<span>Active: <strong id="activeCount">?</strong></span>
</div>
</nav>
<div class="container">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
<h1 style="font-size:22px;font-weight:800;">🛰️ Agent Command Console</h1>
<button class="refresh-btn" onclick="fetchAgents()">⟳ Refresh</button>
</div>
<p style="font-size:12px;color:var(--muted);margin-bottom:20px;">Sub-agent status, tasks, and activity tracker.</p>
<div class="grid" id="agentList">
<div class="empty"><div class="icon">📡</div>Waiting for data...</div>
</div>
<p class="last-update" id="lastUpdate">Last update: —</p>
</div>
<footer>SENTRY Command Console — Darwin</footer>
<script>
async function fetchAgents() {
  const list = document.getElementById('agentList');
  const totalEl = document.getElementById('totalCount');
  const activeEl = document.getElementById('activeCount');
  const lastEl = document.getElementById('lastUpdate');
  list.innerHTML = '<div class="empty"><div class="icon">📡</div>Loading...</div>';
  try {
    // Use OpenClaw gateway API to list sessions
    const apiUrl = window.location.origin === 'http://localhost' || window.location.origin === 'http://127.0.0.1'
      ? 'http://127.0.0.1:18789/api/sessions'
      : '/__openclaw__/api/sessions';
    
    const res = await fetch(apiUrl);
    let data;
    if (res.ok) {
      data = await res.json();
    } else {
      // Fallback: use the CLI output if API unavailable
      throw new Error('API unavailable');
    }
    renderAgents(data);
  } catch(e) {
    // If API fails, show placeholder with manual entry option
    list.innerHTML = `<div class="empty"><div class="icon">🔌</div>Gateway API unreachable.<br><span style="font-size:11px;">${e.message}</span></div>`;
  }
  lastEl.textContent = 'Last update: ' + new Date().toLocaleTimeString('en-SG', {hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'Asia/Singapore'}) + ' SGT';
}

function renderAgents(data) {
  const list = document.getElementById('agentList');
  const sessions = data?.sessions || data || [];
  const subagents = sessions.filter(s => s.key && (s.key.includes('subagent') || s.kind === 'spawn-child'));
  const total = subagents.length;
  const active = subagents.filter(s => {
    const age = parseAge(s.age);
    return age !== null && age < 600; // active within 10 min
  }).length;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('activeCount').textContent = active;
  if (total === 0) {
    list.innerHTML = '<div class="empty"><div class="icon">🤖</div>No sub-agents deployed.</div>';
    return;
  }
  list.innerHTML = subagents.map(s => {
    const key = s.key || '';
    const label = s.label || s.taskName || s.id?.slice(0,8) || 'unknown';
    const kind = s.kind || 'subagent';
    const ageStr = s.age || '?';
    const model = s.model || '—';
    const runtime = s.runtime || s.R?.r || '—';
    const tokens = s.tokens || s['Tokens (ctx %)'] || '—';
    const flags = s.flags || '';
    const isSentry = key.includes('project-sentry') || key.includes('8925ad48');
    const ageSec = parseAge(ageStr);
    const isActive = ageSec !== null && ageSec < 600;
    const dot = isActive ? 'green' : (ageSec !== null && ageSec < 3600 ? 'amber' : 'gray');
    const tag = isSentry ? 'sentry' : 'subagent';
    const tagLabel = isSentry ? 'SENTRY' : 'SUBAGENT';
    return `<div class="agent-card">
      <div class="agent-header">
        <div class="agent-name">
          <span class="status-dot ${dot}"></span>
          <span>${label}</span>
          <span class="tag ${tag}">${tagLabel}</span>
          <span class="tag ${isActive ? 'active' : 'idle'}">${isActive ? 'ACTIVE' : 'IDLE'}</span>
        </div>
      </div>
      <div class="agent-meta">
        <strong>Key:</strong> ${key.slice(0,50)}${key.length>50?'...':''}<br>
        <strong>Model:</strong> ${model} · <strong>Age:</strong> ${ageStr} · <strong>Runtime:</strong> ${runtime}<br>
        <strong>Tokens:</strong> ${tokens} · <strong>Flags:</strong> ${flags || '—'}
      </div>
    </div>`;
  }).join('');
}

function parseAge(str) {
  if (!str) return null;
  const m = str.match(/(\d+)\s*(s|sec|seconds?|m|min|minutes?|h|hr|hours?)/i);
  if (!m) return null;
  const n = parseInt(m[1]);
  const unit = m[2][0].toLowerCase();
  if (unit === 's') return n;
  if (unit === 'm') return n * 60;
  if (unit === 'h') return n * 3600;
  return null;
}

fetchAgents();
setInterval(fetchAgents, 30000);
</script>
</body>
</html>
