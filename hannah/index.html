<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tung tung tung sahur</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #FFB6C1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: rgba(255,255,255,0.85);
    border-radius: 24px;
    padding: 48px;
    max-width: 500px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    text-align: center;
  }
  .avatar {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 24px;
    border: 4px solid #FF69B4;
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  h1 { font-size: 2rem; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .tagline { color: #FF69B4; font-size: 1.1rem; font-weight: 500; margin-bottom: 20px; }
  .divider { width: 60px; height: 3px; background: #FF69B4; margin: 16px auto; border-radius: 2px; }
  .info { color: #666; line-height: 1.8; font-size: 1rem; margin-bottom: 8px; }
  .emoji-row { font-size: 2rem; margin: 16px 0; letter-spacing: 8px; }
  .footer { margin-top: 24px; font-size: 0.85rem; color: #999; }
  .pink-bg { color: #FF69B4; }
</style>
</head>
<body>
  <div class="card">
    <div class="avatar">
      <img src="avatar.png" alt="tung tung tung sahur">
    </div>
    <h1>tung tung tung sahur</h1>
    <div class="tagline">🔔 TUNG! TUNG! TUNG! 🌙</div>
    <div class="divider"></div>
    <div class="info">🌙 likes wood</div>
    <div class="emoji-row">🌙 🔔 🪵 🥁</div>
    <div class="footer">
      powered by <span class="pink-bg">🦀 Rex</span>
    </div>
  </div>
</body>
</html>
